  active_model_id: primary
  providers:
    ollama:
      refresh_models_on_startup: false
      models:
      - id: 40_mini
        display_name: 4o-mini
        role: primary
        enabled: true
      - id: oss120b
        display_name: oss120b
        role: primary
        enabled: true
      - id: llama_70b
        display_name: LLAMA 70b
        role: secondary
        enabled: true
    lm_studio:
      refresh_models_on_startup: false
